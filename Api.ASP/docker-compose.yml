services:
  wms-api:
    image: ${DOCKER_REGISTRY-}wmsapi
    container_name: wms-api
    build:
      context: .
      dockerfile: Wms.Api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - 5000:8080
      - 5001:8081

  postgres:
    image: postgres:17
    container_name: wms-postgres
    environment:
      - POSTGRES_DB=wms
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=qwe123
    volumes:
      - ./.containers/db:/var/lib/postgresql/data
    ports:
      - 5432:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d wms"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

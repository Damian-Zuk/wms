name: Deploy API

# Builds the WMS API container, pushes it to GitHub Container Registry (GHCR),
# and rolls it out to the Azure Container App created by deploy/deploy-azure.ps1.
#
# Required repo secret:
#   AZURE_CREDENTIALS  — JSON from:
#     az ad sp create-for-rbac --name wms-deploy --role contributor \
#       --scopes /subscriptions/<SUB_ID>/resourceGroups/wms-rg --sdk-auth
#
# GITHUB_TOKEN (built in) authenticates the GHCR push — no PAT needed. After the
# first successful run, make the GHCR package public so Container Apps can pull
# it without credentials, or wire creds with `az containerapp registry set`.

on:
  push:
    branches: [azure-testing]
    paths:
      - "Api.ASP/**"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch:

env:
  RESOURCE_GROUP: wms-rg
  APP_NAME: wms-api

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute lowercase image name
        id: img
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/wms-api" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: Api.ASP
          file: Api.ASP/Wms.Api/Dockerfile
          push: true
          tags: |
            ${{ steps.img.outputs.image }}:latest
            ${{ steps.img.outputs.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Container Apps
        run: |
          az extension add --name containerapp --upgrade --only-show-errors
          az containerapp update \
            --name "$APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --image "${{ steps.img.outputs.image }}:${{ github.sha }}"
